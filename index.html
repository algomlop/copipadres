<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Clipboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet" />
  <style>
    /* ─── CONFIG ──────────────────────────────────────────────── */
    :root {
      --bg: #0e0e0e;
      --surface: #161616;
      --border: #2a2a2a;
      --accent: #c8ff00;
      --accent-dim: #8ab300;
      --text: #e8e8e8;
      --muted: #666;
      --radius: 4px;
      --mono: 'JetBrains Mono', monospace;
      --display: 'Syne', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--mono);
      font-size: 14px;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 48px 24px 80px;
    }

    /* ─── HEADER ─────────────────────────────────────────────── */
    header {
      width: 100%;
      max-width: 680px;
      margin-bottom: 48px;
      display: flex;
      align-items: baseline;
      gap: 16px;
    }

    h1 {
      font-family: var(--display);
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -0.5px;
      color: var(--accent);
      line-height: 1;
    }

    .subtitle {
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    /* ─── MAIN CARD ──────────────────────────────────────────── */
    .card {
      width: 100%;
      max-width: 680px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }

    /* ─── DISPLAY SECTION ────────────────────────────────────── */
    .display-section {
      padding: 24px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      min-height: 80px;
    }

    .label {
      font-size: 10px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    #display-content {
      font-family: var(--mono);
      font-size: 14px;
      line-height: 1.75;
      color: var(--text);
      white-space: pre-wrap;
      word-break: break-word;
      min-height: 40px;
    }

    #display-content.empty {
      color: var(--muted);
      font-style: italic;
    }

    #display-content a {
      color: var(--accent);
      text-decoration: none;
      border-bottom: 1px solid var(--accent-dim);
      transition: border-color 0.15s, color 0.15s;
    }

    #display-content a:hover {
      color: #fff;
      border-color: #fff;
    }

    /* ─── INPUT SECTION ──────────────────────────────────────── */
    .input-section {
      padding: 24px;
      background: var(--bg);
    }

    textarea {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: var(--mono);
      font-size: 14px;
      line-height: 1.6;
      padding: 14px 16px;
      resize: vertical;
      min-height: 100px;
      outline: none;
      transition: border-color 0.2s;
      tab-size: 2;
    }

    textarea::placeholder { color: var(--muted); }

    textarea:focus {
      border-color: var(--accent-dim);
    }

    .actions {
      margin-top: 12px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    button#save-btn {
      background: var(--accent);
      color: #0e0e0e;
      border: none;
      border-radius: var(--radius);
      font-family: var(--display);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      padding: 10px 24px;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
    }

    button#save-btn:hover { background: #d8ff33; }
    button#save-btn:active { transform: scale(0.97); }
    button#save-btn:disabled {
      background: var(--border);
      color: var(--muted);
      cursor: not-allowed;
    }

    #status {
      font-size: 12px;
      color: var(--muted);
      flex: 1;
      text-align: right;
      transition: color 0.3s;
    }

    #status.ok   { color: var(--accent); }
    #status.err  { color: #ff5f5f; }
    #status.busy { color: var(--muted); }

    /* ─── LOADING SHIMMER ────────────────────────────────────── */
    .shimmer {
      height: 14px;
      border-radius: 3px;
      background: linear-gradient(90deg, var(--border) 25%, #2f2f2f 50%, var(--border) 75%);
      background-size: 400% 100%;
      animation: shimmer 1.4s infinite;
      margin-bottom: 8px;
    }

    .shimmer:last-child { width: 60%; }

    @keyframes shimmer {
      0%   { background-position: 100% 0; }
      100% { background-position: -100% 0; }
    }

    /* ─── FOOTER ─────────────────────────────────────────────── */
    footer {
      margin-top: 32px;
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>

  <header>
    <h1>Clipboard</h1>
    <span class="subtitle">shared · persistent</span>
  </header>

  <div class="card">
    <!-- Current saved content -->
    <div class="display-section">
      <div class="label">current content</div>
      <div id="display-content" class="empty">loading…</div>
    </div>

    <!-- Input -->
    <div class="input-section">
      <div class="label">new content</div>
      <textarea id="input" placeholder="Paste text, a URL, anything…"></textarea>
      <div class="actions">
        <button id="save-btn">Save</button>
        <span id="status">—</span>
      </div>
    </div>
  </div>

  <footer>changes are visible to everyone instantly</footer>

  <script>
    /* ================================================================
       ⚙️  CONFIGURATION — edit these four values before deploying
       ================================================================ */
    const CONFIG = {
      owner: "algomlop",   // e.g. "johndoe"
      repo:  "copipadres",         // e.g. "my-clipboard"
      file:  "data.txt",               // file that stores the content
      token: "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"         // fine-grained PAT (see README)
    };
    /* ============================================================== */

    const API   = `https://api.github.com/repos/${CONFIG.owner}/${CONFIG.repo}/contents/${CONFIG.file}`;
    const HEADS = {
      "Authorization": `Bearer ${CONFIG.token}`,
      "Accept":        "application/vnd.github+json",
      "X-GitHub-Api-Version": "2022-11-28",
      "Content-Type":  "application/json"
    };

    const display = document.getElementById("display-content");
    const input   = document.getElementById("input");
    const saveBtn = document.getElementById("save-btn");
    const status  = document.getElementById("status");

    let currentSha = null; // GitHub requires the blob SHA to update a file

    // ── URL detection & rendering ──────────────────────────────────
    function renderContent(text) {
      if (!text || !text.trim()) {
        display.className = "empty";
        display.textContent = "nothing saved yet";
        return;
      }
      display.className = "";
      // Split on URLs and wrap them as <a> tags
      const urlRe = /(https?:\/\/[^\s<>"{}|\\^`[\]]+)/g;
      const parts = text.split(urlRe);
      display.innerHTML = "";
      parts.forEach((part, i) => {
        if (i % 2 === 1) {
          // It's a URL
          const a = document.createElement("a");
          a.href = part;
          a.textContent = part;
          a.target = "_blank";
          a.rel = "noopener noreferrer";
          display.appendChild(a);
        } else if (part) {
          display.appendChild(document.createTextNode(part));
        }
      });
    }

    // ── Show shimmer while loading ─────────────────────────────────
    function showShimmer() {
      display.className = "";
      display.innerHTML = `
        <div class="shimmer"></div>
        <div class="shimmer"></div>
        <div class="shimmer"></div>`;
    }

    // ── Load current file from GitHub ──────────────────────────────
    async function load() {
      showShimmer();
      try {
        const res = await fetch(API, { headers: HEADS });
        if (res.status === 404) {
          currentSha = null;
          renderContent("");
          return;
        }
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        currentSha = data.sha;
        const text = decodeURIComponent(escape(atob(data.content.replace(/\n/g, ""))));
        renderContent(text);
      } catch (e) {
        display.className = "empty";
        display.textContent = "⚠ could not load — check CONFIG values";
        console.error(e);
      }
    }

    // ── Save new content to GitHub ─────────────────────────────────
    async function save() {
      const text = input.value;
      if (!text.trim()) return;

      saveBtn.disabled = true;
      setStatus("busy", "saving…");

      try {
        const encoded = btoa(unescape(encodeURIComponent(text)));
        const body = {
          message: "update clipboard",
          content: encoded,
          ...(currentSha ? { sha: currentSha } : {})
        };

        const res = await fetch(API, {
          method: "PUT",
          headers: HEADS,
          body: JSON.stringify(body)
        });

        if (!res.ok) {
          const err = await res.json();
          throw new Error(err.message || `HTTP ${res.status}`);
        }

        const data = await res.json();
        currentSha = data.content.sha;
        renderContent(text);
        input.value = "";
        setStatus("ok", "saved ✓");
        setTimeout(() => setStatus("busy", "—"), 3000);

      } catch (e) {
        setStatus("err", "error: " + e.message);
        console.error(e);
      } finally {
        saveBtn.disabled = false;
      }
    }

    function setStatus(cls, msg) {
      status.className = cls;
      status.textContent = msg;
    }

    // ── Wire up ────────────────────────────────────────────────────
    saveBtn.addEventListener("click", save);
    input.addEventListener("keydown", e => {
      if ((e.ctrlKey || e.metaKey) && e.key === "Enter") save();
    });

    load();
  </script>
</body>
</html>
